name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
          - nightly
        os:
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          # Collect coverage only on the stable release to avoid duplicate uploads.
          coverage: ${{ matrix.version == '1' }}

      # Coverage upload: only runs when coverage was collected (stable Julia on ubuntu).
      # Requires the CODECOV_TOKEN repository secret:
      #   1. Log in at https://codecov.io and add this repository.
      #   2. Copy the upload token from Settings → Repository.
      #   3. In GitHub: Settings → Secrets and variables → Actions → New repository secret
      #      Name: CODECOV_TOKEN   Value: <token from codecov.io>
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.version == '1'
      - uses: codecov/codecov-action@v5
        if: matrix.version == '1'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
