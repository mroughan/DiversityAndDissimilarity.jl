name: Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  aqua-jet:
    name: Aqua and JET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate quality environment
        shell: julia --color=yes --project=test/quality {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
      - name: Run Aqua and JET
        run: julia --color=yes --project=test/quality test/quality/runtests.jl
